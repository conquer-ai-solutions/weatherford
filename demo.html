<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F5F7;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.07);
  --border-light: rgba(0,0,0,0.04);
  --text: #1D1D1F;
  --text-secondary: #424245;
  --text-dim: #6E6E73;
  --text-muted: #86868B;
  --brand: #E31837;
  --brand-light: rgba(227,24,55,0.08);
  --brand-mid: rgba(227,24,55,0.15);
  --green: #10B981;
  --green-bg: rgba(16,185,129,0.08);
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.08);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.08);
  --blue: #3B82F6;
  --blue-bg: rgba(59,130,246,0.08);
  --purple: #8B5CF6;
  --purple-bg: rgba(139,92,246,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.12); border-radius:10px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

.header {
  background:rgba(255,255,255,0.8);
  border-bottom:1px solid var(--border);
  padding:0 40px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px);
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-mark { width:28px; height:28px; background:var(--brand); border-radius:8px; display:flex; align-items:center; justify-content:center; }
.logo-mark svg { width:16px; height:16px; fill:white; }
.logo-name { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
.logo-div { width:1px; height:18px; background:var(--border); margin:0 12px; }
.logo-product { font-size:13px; font-weight:600; color:var(--brand); }
.header-right { display:flex; align-items:center; gap:10px; }
.nav-tabs { display:flex; background:#F3F4F6; border-radius:10px; padding:3px; gap:2px; }
.nav-tab { padding:6px 16px; border-radius:8px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:500; font-family:var(--font); transition:all 0.2s; white-space:nowrap; }
.nav-tab.active { background:#fff; color:var(--text); box-shadow:var(--shadow-sm); font-weight:600; }
.indicative-badge { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; background:var(--amber-bg); font-size:11px; font-weight:600; color:var(--amber); text-transform:uppercase; letter-spacing:0.5px; }

.page { padding:28px 40px; max-width:1320px; margin:0 auto; animation:fadeIn 0.3s ease; }

/* COVER */
.cover-hero { display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; margin-bottom:48px; }
.cover-eyebrow { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--brand); margin-bottom:16px; }
.cover-title { font-size:44px; font-weight:800; letter-spacing:-1.5px; line-height:1.08; margin-bottom:16px; }
.cover-title span { color:var(--brand); }
.cover-sub { font-size:16px; color:var(--text-dim); line-height:1.65; margin-bottom:32px; }
.cover-stats { display:flex; gap:32px; }
.stat-val { font-size:30px; font-weight:800; letter-spacing:-1px; color:var(--brand); }
.stat-lbl { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; font-weight:500; }
.cover-visual { width:100%; aspect-ratio:1.3; background:linear-gradient(135deg,#FEF2F2,#FFF5F5,#FEF2F2); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; box-shadow:var(--shadow-lg); }
.cover-features { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.cover-feature { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow-sm); transition:all 0.3s; cursor:pointer; }
.cover-feature:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); }
.feature-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:14px; }
.feature-title { font-size:14px; font-weight:700; margin-bottom:6px; }
.feature-body { font-size:13px; color:var(--text-dim); line-height:1.6; }

/* FLOW DIAGRAM */
.flow { display:flex; align-items:center; gap:0; overflow-x:auto; padding:24px 0; }
.flow-node { flex-shrink:0; width:130px; text-align:center; }
.flow-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 8px; box-shadow:var(--shadow-sm); position:relative; min-height:70px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.flow-box.highlight { border-color:var(--brand); background:var(--brand-light); }
.flow-box.ai-node { border-color:var(--brand); border-width:2px; }
.flow-box.tcs { border-color:var(--amber); background:var(--amber-bg); }
.flow-icon { font-size:18px; margin-bottom:4px; }
.flow-label { font-size:11px; font-weight:600; color:var(--text); line-height:1.3; }
.flow-sub { font-size:9px; color:var(--text-muted); margin-top:2px; line-height:1.2; }
.flow-arrow { font-size:16px; color:var(--text-muted); flex-shrink:0; margin:0 3px; }
.flow-arrow.brand { color:var(--brand); font-weight:700; }
.ai-badge { position:absolute; top:-8px; left:50%; transform:translateX(-50%); background:var(--brand); color:white; font-size:8px; font-weight:700; padding:2px 8px; border-radius:20px; white-space:nowrap; letter-spacing:0.05em; }

/* EXCEPTION QUEUE */
.two-col { display:grid; grid-template-columns:340px 1fr; gap:20px; height:calc(100vh - 140px); }
.three-col { display:grid; grid-template-columns:300px 1fr 340px; gap:16px; height:calc(100vh - 140px); }
.panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--shadow-sm); }
.panel-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.panel-title { font-size:13px; font-weight:700; color:var(--text); }
.panel-badge { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; }
.panel-body { flex:1; overflow-y:auto; }

.queue-item { padding:14px 18px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:background 0.15s; }
.queue-item:hover { background:#FAFAFA; }
.queue-item.active { background:var(--brand-light); }
.queue-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.queue-id { font-size:12px; font-weight:700; font-family:'Courier New',monospace; color:var(--text); }
.queue-type { font-size:9px; font-weight:700; padding:2px 7px; border-radius:20px; text-transform:uppercase; letter-spacing:0.05em; }
.type-T { background:#DBEAFE; color:#1D4ED8; }
.type-E { background:var(--red-bg); color:var(--red); }
.type-D { background:var(--amber-bg); color:var(--amber); }
.type-C { background:var(--purple-bg); color:var(--purple); }
.queue-desc { font-size:12px; color:var(--text-dim); line-height:1.5; margin-bottom:4px; }
.queue-meta { font-size:11px; color:var(--text-muted); display:flex; gap:12px; }

/* DETAIL VIEW */
.detail-section { padding:18px; border-bottom:1px solid var(--border-light); }
.detail-label { font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.detail-field { font-size:12px; }
.detail-field-label { color:var(--text-muted); font-weight:500; }
.detail-field-value { color:var(--text); font-weight:600; margin-top:1px; }

.recommendation-card { border-radius:var(--radius-sm); padding:14px 16px; margin-bottom:10px; }
.recommendation-card.approve { background:var(--green-bg); border:1px solid rgba(16,185,129,0.2); }
.recommendation-card.review { background:var(--amber-bg); border:1px solid rgba(245,158,11,0.2); }
.recommendation-card.reject { background:var(--red-bg); border:1px solid rgba(239,68,68,0.2); }
.rec-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.rec-icon { font-size:16px; }
.rec-title { font-size:13px; font-weight:700; }
.recommendation-card.approve .rec-title { color:var(--green); }
.recommendation-card.review .rec-title { color:var(--amber); }
.recommendation-card.reject .rec-title { color:var(--red); }
.rec-body { font-size:13px; color:var(--text-secondary); line-height:1.6; }
.rec-confidence { font-size:11px; font-weight:600; margin-top:8px; display:flex; align-items:center; gap:6px; }
.conf-bar { height:4px; border-radius:4px; background:#E5E7EB; flex:1; max-width:120px; overflow:hidden; }
.conf-fill { height:100%; border-radius:4px; }
.conf-fill.high { background:var(--green); }
.conf-fill.med { background:var(--amber); }

.action-btns { display:flex; gap:8px; padding:18px; border-top:1px solid var(--border); }
.action-btn { flex:1; padding:10px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; font-family:var(--font); border:none; }
.action-btn.primary { background:var(--brand); color:white; }
.action-btn.primary:hover { background:#c41530; }
.action-btn.secondary { background:#F3F4F6; color:var(--text-secondary); border:1px solid var(--border); }
.action-btn.secondary:hover { background:#E5E7EB; }

/* OQ TABLE */
.oq-table { width:100%; border-collapse:collapse; font-size:13px; }
.oq-table th { padding:10px 14px; text-align:left; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); background:#FAFAFA; position:sticky; top:0; }
.oq-table td { padding:11px 14px; border-bottom:1px solid var(--border-light); vertical-align:middle; }
.oq-table tr:hover td { background:#FAFAFA; }
.oq-table tr.ai-row td { background:var(--brand-light); }
.status-pill { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.pill-green { background:var(--green-bg); color:var(--green); }
.pill-amber { background:var(--amber-bg); color:var(--amber); }
.pill-red { background:var(--red-bg); color:var(--red); }
.pill-blue { background:var(--blue-bg); color:var(--blue); }
.pill-brand { background:var(--brand-light); color:var(--brand); }

/* APPROVAL CARDS */
.approval-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; padding:20px; }
.approval-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow-sm); transition:all 0.2s; }
.approval-card:hover { box-shadow:var(--shadow-md); }
.approval-card.flagged { border-left:3px solid var(--amber); }
.approval-card.auto { border-left:3px solid var(--green); }
.approval-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.approval-or { font-size:12px; font-weight:700; font-family:'Courier New',monospace; }
.approval-amount { font-size:16px; font-weight:800; letter-spacing:-0.5px; }
.approval-details { font-size:12px; color:var(--text-dim); line-height:1.6; margin-bottom:12px; }
.approval-footer { display:flex; justify-content:space-between; align-items:center; }
.approval-action { font-size:11px; font-weight:700; padding:5px 12px; border-radius:20px; cursor:pointer; border:none; font-family:var(--font); }
.approval-action.approve { background:var(--green); color:white; }
.approval-action.review { background:var(--amber); color:white; }

/* AI CHAT */
.chat-panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--shadow-sm); }
.chat-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.chat-avatar { width:28px; height:28px; border-radius:8px; background:var(--brand); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.chat-avatar svg { width:14px; height:14px; fill:white; }
.chat-name { font-size:13px; font-weight:700; }
.chat-status { font-size:11px; color:var(--green); font-weight:500; display:flex; align-items:center; gap:5px; }
.chat-status::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 2s infinite; }
.messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.msg { display:flex; gap:8px; align-items:flex-start; max-width:90%; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg-av { width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
.msg.ai .msg-av { background:var(--brand); color:white; }
.msg.user .msg-av { background:#E5E7EB; color:var(--text-secondary); }
.msg-bubble { padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.6; }
.msg.ai .msg-bubble { background:#F3F4F6; color:var(--text); border-bottom-left-radius:3px; }
.msg.user .msg-bubble { background:var(--brand); color:white; border-bottom-right-radius:3px; }
.chips { display:flex; flex-wrap:wrap; gap:6px; padding:10px 16px; border-top:1px solid var(--border); flex-shrink:0; }
.chip { padding:6px 12px; border:1px solid var(--border); border-radius:20px; font-size:12px; color:var(--text-secondary); cursor:pointer; background:white; font-family:var(--font); transition:all 0.15s; }
.chip:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }

/* SUMMARY CARDS */
.summary-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.summary-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow-sm); }
.summary-val { font-size:28px; font-weight:800; letter-spacing:-1px; margin-bottom:2px; }
.summary-lbl { font-size:11px; color:var(--text-muted); font-weight:500; }
</style>

              <div className="msg-av">AI</div>
              <div className="msg-bubble">I've processed <strong>{backorders.length} backorders</strong> from today's MRP/DRP run. <strong>{converted}</strong> were auto-converted to OQs — standard items, single-source suppliers, within value thresholds.</div>
            </div>
            <div className="msg ai">
              <div className="msg-av">AI</div>
              <div className="msg-bubble"><strong>{review} items need your attention:</strong><br/><br/>• <strong>BO-88414</strong> (Drill Bits, $384K) — Multiple supplier quotes with 12%+ price variance. Recommend competitive RFQ.<br/><br/>• <strong>BO-88417</strong> (Wellhead Assembly, $520K) — Exceeds auto-convert value threshold and has custom specs. Needs engineering + buyer sign-off.</div>
            </div>
            <div className="msg user">
              <div className="msg-av">SK</div>
              <div className="msg-bubble">What did we consolidate today?</div>
            </div>
            <div className="msg ai">
              <div className="msg-av">AI</div>
              <div className="msg-bubble">One consolidation: <strong>BO-88416</strong> (Wireline Cable for Singapore) was merged with an existing open OQ. Bulk discount applied — saved approximately $2,700 vs. separate order. The rest were unique requirements.</div>
            </div>
          </div>
          <div className="chips">
            <span className="chip">Show consolidations</span>
            <span className="chip">Supplier breakdown</span>
            <span className="chip">Value by plant</span>
            <span className="chip">Override threshold</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── AUTO APPROVALS PAGE ──
function ApprovalsPage({ approvals, processed, onAction }) {
  const auto = approvals.filter(a=>a.aiDecision==='auto-approved').length;
  const flagged = approvals.filter(a=>a.aiDecision==='flagged').length;
  const totalValue = approvals.reduce((s,a)=>s+parseInt(a.value.replace(/[^0-9]/g,'')),0);

  return (
    <div className="page">
      <div className="summary-strip">
        <div className="summary-card"><div className="summary-val" style={{color:'var(--text)'}}>{approvals.length}</div><div className="summary-lbl">Requisitions Today</div></div>
        <div className="summary-card"><div className="summary-val" style={{color:'var(--green)'}}>{auto}</div><div className="summary-lbl">Auto-Approved</div></div>
        <div className="summary-card"><div className="summary-val" style={{color:'var(--amber)'}}>{flagged}</div><div className="summary-lbl">Flagged for Review</div></div>
        <div className="summary-card"><div className="summary-val" style={{color:'var(--brand)'}}>${(totalValue/1000000).toFixed(1)}M</div><div className="summary-lbl">Total Value</div></div>
      </div>

      <div className="two-col" style={{gridTemplateColumns:'1fr 340px'}}>
        <div className="panel">
          <div className="panel-header">
            <span className="panel-title">Order Requisition Approvals</span>
          </div>
          <div className="panel-body">
            <div className="approval-grid">
              {approvals.map(a => (
                <div key={a.id} className={`approval-card ${a.aiDecision==='flagged'?'flagged':'auto'}`}>
                  <div className="approval-top">
                    <div>
                      <div className="approval-or">{a.id}</div>
                      <div style={{fontSize:'12px',color:'var(--text-dim)',marginTop:'2px'}}>{a.requester} · {a.dept}</div>
                    </div>
                    <div className="approval-amount">{a.value}</div>
                  </div>
                  <div className="approval-details">
                    <strong>{a.item}</strong><br/>
                    GOA: {a.goa} · Priority: {a.priority}
                  </div>
                  <div style={{fontSize:'12px',color:'var(--text-secondary)',lineHeight:1.5,marginBottom:'12px',padding:'10px',background:'#F9FAFB',borderRadius:'6px'}}>
                    <span style={{fontSize:'10px',fontWeight:700,color:a.aiDecision==='auto-approved'?'var(--green)':'var(--amber)',textTransform:'uppercase',letterSpacing:'0.05em'}}>AI: </span>
                    {a.aiNote}
                  </div>
                  <div className="approval-footer">
                    <div className="rec-confidence" style={{margin:0}}>
                      <span style={{color:'var(--text-muted)',fontSize:'11px'}}>Confidence:</span>
                      <span style={{fontWeight:700,fontSize:'12px',color:a.confidence>=90?'var(--green)':'var(--amber)'}}>{a.confidence}%</span>
                    </div>
                    {processed[a.id] ? (
                      <span className="status-pill pill-green">✓ Done</span>
                    ) : a.aiDecision==='auto-approved' ? (
                      <span className="status-pill pill-green" style={{fontSize:'11px'}}>✓ Auto-approved</span>
                    ) : (
                      <div style={{display:'flex',gap:'6px'}}>
                        <button className="approval-action approve" onClick={()=>onAction(a.id,'Approved')}>Approve</button>
                        <button className="approval-action review" onClick={()=>onAction(a.id,'Returned')}>Return</button>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* AI Panel */}
        <div className="chat-panel">
          <div className="chat-header">
            <div className="chat-avatar"><svg viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
            <div>
              <div className="chat-name">Procurement AI</div>
              <div className="chat-status">Monitoring approvals</div>
            </div>
          </div>
          <div className="messages">
            <div className="msg ai">
              <div className="msg-av">AI</div>
              <div className="msg-bubble">Today's batch: <strong>{approvals.length} requisitions</strong> totalling <strong>${(totalValue/1000000).toFixed(1)}M</strong>. I auto-approved <strong>{auto}</strong> that were within GOA limits with no anomalies. <strong>{flagged} need your review.</strong></div>
            </div>
            <div className="msg ai">
              <div className="msg-av">AI</div>
              <div className="msg-bubble"><strong>Key flags:</strong><br/><br/>🔴 <strong>OR-26-5503</strong> — CNC lathe retrofit is $30K over remaining CAPEX budget. Needs CFO co-sign.<br/><br/>🟡 <strong>OR-26-5504</strong> — Drill pipe price jumped 17% vs last purchase. Possible market leverage by supplier.<br/><br/>🟡 <strong>OR-26-5506</strong> — $890K cementing unit but there's an idle one in the Midland yard. Transfer would save $855K.</div>
            </div>
            <div className="msg user">
              <div className="msg-av">SK</div>
              <div className="msg-bubble">That Midland unit — is it operational?</div>
            </div>
            <div className="msg ai">
              <div className="msg-av">AI</div>
              <div className="msg-bubble">Unit CU-034 last operated 3 months ago on the Permian project. Maintenance records show it passed last inspection. Transfer + recommissioning estimated at $35K. That's a <strong>96% cost reduction</strong> vs new purchase. I'd recommend routing to fleet management for confirmation before approving the new PO.</div>
            </div>
          </div>
          <div className="chips">
            <span className="chip">Budget utilisation</span>
            <span className="chip">Price anomalies</span>
            <span className="chip">Fleet availability</span>
            <span className="chip">Approval trends</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
